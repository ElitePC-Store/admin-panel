<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم عصابة يوسف</title>
    <style>
        body { font-family: Arial; background-color: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .box { background: #16213e; padding: 20px; border-radius: 15px; width: 80%; margin: auto; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        input, select { padding: 10px; margin: 5px; width: 200px; border-radius: 5px; border: none; }
        button { padding: 10px 15px; background: #0f3460; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
        .btn-red { background: #e94560; }
        .btn-green { background: #4ecca3; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; color: white; }
        td, th { border: 1px solid #0f3460; padding: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>لوحة تحكم عصابة يوسف</h1>
    
    <input type="text" id="searchId" placeholder="ID العضو">
    <button onclick="showDetails()">عرض سجل العضو</button>
    <button onclick="showAllMembers()">سجل العصابة الكامل</button>
    
    <div id="displayArea"></div>
</div>

<script>
    let members = JSON.parse(localStorage.getItem('gangData')) || {
        "-7373": { name: "يوسف", rank: "HeadVisor", joinDate: "2026-06-01", points: 600, target: 1250, warnings: 0, notes: "" }
    };

    function showDetails() {
        const id = document.getElementById('searchId').value;
        const m = members[id];
        if (!m) { alert("العضو غير موجود"); return; }
        const diffDays = Math.floor((new Date() - new Date(m.joinDate)) / (1000 * 60 * 60 * 24));
        
        document.getElementById('displayArea').innerHTML = `
            <h3>سجل العضو: ${m.name}</h3>
            <table border="1">
                <tr><th>الرتبة</th><td>${m.rank}</td></tr>
                <tr><th>الدخول للعصابة</th><td>${m.joinDate} (${diffDays} يوم)</td></tr>
                <tr><th>النقاط</th><td>${m.points} / ${m.target}</td></tr>
                <tr><th>الملاحظات</th><td>${m.notes}</td></tr>
            </table>
            <button onclick="updatePoints('${id}', 100)">+100</button>
            <button onclick="updatePoints('${id}', -100)">-100</button>
            <button class="btn-red" onclick="addWarning('${id}')">تحذير (+1)</button>
            <input type="text" id="noteInput" placeholder="اكتب ملاحظة...">
            <button class="btn-green" onclick="saveNote('${id}')">حفظ ملاحظة</button>
        `;
    }

    function updatePoints(id, val) {
        members[id].points += val;
        localStorage.setItem('gangData', JSON.stringify(members));
        showDetails();
    }

    function addWarning(id) {
        members[id].warnings++;
        localStorage.setItem('gangData', JSON.stringify(members));
        showDetails();
    }

    function saveNote(id) {
        members[id].notes = document.getElementById('noteInput').value;
        localStorage.setItem('gangData', JSON.stringify(members));
        alert("تم حفظ الملاحظة!");
    }

    function showAllMembers() {
        let html = "<table><tr><th>ID</th><th>الاسم</th><th>النقاط</th><th>الحالة</th></tr>";
        for (let id in members) {
            let status = members[id].points >= members[id].target ? "✅" : "❌";
            html += `<tr><td>${id}</td><td>${members[id].name}</td><td>${members[id].points}</td><td>${status}</td></tr>`;
        }
        document.getElementById('displayArea').innerHTML = html + "</table>";
    }
</script>
</body>
</html>
