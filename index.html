<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title id="pageTitle">لوحة تحكم العصابة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b0e14; color: #e0e0e0; text-align: center; padding: 20px; }
        .box { background: #161b22; padding: 20px; border-radius: 15px; width: 95%; margin: auto; border: 1px solid #30363d; }
        input, select { padding: 10px; margin: 5px; width: 140px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 8px 15px; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
        .btn-add { background: #238636; }
        .btn-sub { background: #b62323; }
        .btn-del { background: #da3633; }
        .btn-search { background: #0969da; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td, th { border: 1px solid #30363d; padding: 10px; font-size: 14px; }
        #logoImg { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        #loginScreen, #rankModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #30363d; }
    </style>
</head>
<body>

<div id="loginScreen" style="display: flex;">
    <h1>دخول لوحة التحكم</h1>
    <input type="password" id="passInput" placeholder="أدخل كلمة السر">
    <button class="btn-add" onclick="checkPassword()">دخول</button>
</div>

<div id="rankModal">
    <div class="modal-content">
        <h3>اختر الرتبة الجديدة</h3>
        <select id="selectNewRank"></select><br><br>
        <button class="btn-add" onclick="confirmRankChange()">تحديث الرتبة</button>
        <button class="btn-del" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<div id="mainContent" class="box" style="display: none;">
    <img id="logoImg" src="https://via.placeholder.com/100" alt="Logo">
    <h1 id="mainTitle">لوحة تحكم العصابة</h1>
    
    <div>
        <h3>تخصيص اللوحة</h3>
        <input type="text" id="newTitle" placeholder="اسم العصابة">
        <input type="text" id="newLogo" placeholder="رابط الصورة">
        <button class="btn-add" onclick="updateSettings()">حفظ الإعدادات</button>
    </div>
    
    <hr style="border-color: #30363d;">
    <div>
        <h3>البحث والفلترة</h3>
        <input type="text" id="searchId" placeholder="ID العضو">
        <button class="btn-search" onclick="searchMember()">بحث</button>
        <select id="filterRankSelect"></select>
        <button class="btn-search" onclick="filterByRank()">فلترة</button>
        <button onclick="showAll()">الكل</button>
    </div>

    <hr style="border-color: #30363d;">
    <div>
        <h3>إدارة الرتب</h3>
        <input type="text" id="newRankName" placeholder="اسم الرتبة">
        <input type="number" id="newRankTarget" placeholder="النقاط المطلوبة">
        <input type="number" id="newRankInterviews" placeholder="المقابلات المطلوبة">
        <button class="btn-add" onclick="manageRank('add')">إضافة</button>
        <button class="btn-del" onclick="manageRank('del')">حذف</button>
    </div>

    <hr style="border-color: #30363d;">
    <div>
        <h3>إضافة عضو</h3>
        <input type="text" id="mId" placeholder="ID العضو">
        <input type="text" id="mName" placeholder="اسم العضو">
        <select id="mRankSelect"></select>
        <button class="btn-add" onclick="saveMember()">حفظ</button>
    </div>

    <hr style="border-color: #30363d;">
    <h3>إدارة النقاط والمقابلات</h3>
    <input type="text" id="targetId" placeholder="ID العضو">
    <input type="number" id="pointInput" placeholder="القيمة">
    <br>
    <button class="btn-add" onclick="changePoints(true)">زيادة نقاط</button>
    <button class="btn-sub" onclick="changePoints(false)">نقص نقاط</button>
    <button class="btn-add" onclick="changeInterviews(true)">إضافة مقابلة</button>
    <button class="btn-sub" onclick="changeInterviews(false)">نقص مقابلة</button>
    
    <div id="displayArea"></div>
</div>

<script>
    const WEBHOOKS = {
        add: "https://discord.com/api/webhooks/1517222406140334150/coHz5FEIdj1HLWMNqZBAbu2yh-LC8aSsWOY5ye0EMLfASfvVP329dY1Ai6IWt6ZalwcW",
        points: "https://discord.com/api/webhooks/1517472882962206722/BDkDPb4x4s-pedBzO0cE8DleLXIbihMC81H5NeF_Wx-B8rkZueYXyGwDroHaLeOvXT_N",
        delete: "https://discord.com/api/webhooks/1517479737864360056/kY54uDPn9Zo5pq4vqhgk-Tn1HdNr_Zq0TrHlOMbujbXi8Jdl-YNH63TXhW4fka9F2Go_",
        rankChange: "https://discord.com/api/webhooks/1517474902066597930/EQUp8iVfIxCqwCDdbDwEJoWVNFdBhOlJFoRKfJx5bEyHkwitxi1OQ0XX_gO5t3RMAj9v",
        settings: "https://discord.com/api/webhooks/1517480388425941113/ViXeSo36kj-5HB161hPDohkj5C1DOCOhE2fOHDFoPvLGtuov0AyymOdPjKHZ-Em4aXsS",
        manageRanks: "https://discord.com/api/webhooks/1517475074729316444/uD4b0ubdYNkyhfhK9Hqz23kWBMfl8GeRJZH1TdDyPBIe4RiA-WqmaOPkkj3iW5-NaaYh",
        nameChange: "https://discord.com/api/webhooks/1517480599189852283/VM2DHJLi98hbHHY0TJiWHmfvdfcc6pbx3m6y_fK84XPaQviXVc7Udwi5jmLycBjZ8P5i"
    };

    let members = JSON.parse(localStorage.getItem('gangData')) || {};
    let ranks = JSON.parse(localStorage.getItem('gangRanks')) || { "عضو": {target: 0, ints: 0} };
    let settings = JSON.parse(localStorage.getItem('gangSettings')) || { title: "لوحة تحكم العصابة", logo: "https://via.placeholder.com/100" };
    let currentEditingId = null;

    function sendToDiscord(title, msg, type) {
        fetch(WEBHOOKS[type], { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: `**${title}**\n${msg}` }) }).catch(err => console.log(err));
    }

    function checkPassword() {
        if (document.getElementById('passInput').value === "ابو العبد") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            applySettings(); showAll(); updateRankSelect();
        } else { alert("كلمة السر خاطئة!"); }
    }

    function applySettings() {
        document.getElementById('mainTitle').innerText = settings.title;
        document.getElementById('pageTitle').innerText = settings.title;
        document.getElementById('logoImg').src = settings.logo;
    }

    function saveMember() {
        const id = document.getElementById('mId').value;
        const name = document.getElementById('mName').value;
        const rank = document.getElementById('mRankSelect').value;
        if (!id || !name) return alert("الرجاء إدخال البيانات");
        members[id] = { name: name, rank: rank, target: ranks[rank].target, targetInts: ranks[rank].ints, points: 0, interviews: 0 };
        localStorage.setItem('gangData', JSON.stringify(members));
        sendToDiscord("إضافة・عضو「➕」", `تم إضافة العضو: ${name} (ID: ${id})`, 'add');
        showAll();
    }

    function changePoints(isAdd) {
        const id = document.getElementById('targetId').value;
        const pts = parseInt(document.getElementById('pointInput').value) || 0;
        if(members[id]) {
            isAdd ? members[id].points += pts : members[id].points -= pts;
            localStorage.setItem('gangData', JSON.stringify(members));
            sendToDiscord("تحديث・النقاط「💎」", `تم ${isAdd ? 'إضافة' : 'خصم'} ${pts} نقطة لـ ${members[id].name}`, 'points');
            showAll();
        }
    }

    function changeInterviews(isAdd) {
        const id = document.getElementById('targetId').value;
        if(members[id]) {
            isAdd ? members[id].interviews += 1 : members[id].interviews -= 1;
            localStorage.setItem('gangData', JSON.stringify(members));
            sendToDiscord("تحديث・النقاط「💎」", `تم ${isAdd ? 'إضافة' : 'خصم'} مقابلة لـ ${members[id].name}`, 'points');
            showAll();
        }
    }

    function deleteMember(id) {
        if(confirm("فصل العضو؟")) {
            sendToDiscord("فصل・عضو「⛔」", `تم فصل العضو: ${members[id].name}`, 'delete');
            delete members[id]; localStorage.setItem('gangData', JSON.stringify(members)); showAll();
        }
    }

    function openRankModal(id) { currentEditingId = id; const select = document.getElementById("selectNewRank"); select.innerHTML = ""; for (let r in ranks) select.innerHTML += `<option value="${r}">${r}</option>`; document.getElementById("rankModal").style.display = "flex"; }
    function closeModal() { document.getElementById("rankModal").style.display = "none"; }

    function confirmRankChange() {
        const newRank = document.getElementById("selectNewRank").value;
        const oldName = members[currentEditingId].name;
        members[currentEditingId].rank = newRank;
        members[currentEditingId].target = ranks[newRank].target;
        members[currentEditingId].targetInts = ranks[newRank].ints;
        localStorage.setItem('gangData', JSON.stringify(members));
        sendToDiscord("تغيير・الرتبة「👑」", `تم تغيير رتبة ${oldName} إلى ${newRank}`, 'rankChange');
        showAll(); closeModal();
    }

    function updateSettings() {
        settings.title = document.getElementById('newTitle').value;
        settings.logo = document.getElementById('newLogo').value;
        localStorage.setItem('gangSettings', JSON.stringify(settings));
        sendToDiscord("تحديث・الإعدادات「⚙️」", "تم تحديث إعدادات اللوحة", 'settings');
        applySettings();
    }

    function manageRank(action) {
        const name = document.getElementById('newRankName').value;
        if (!name) return;
        if (action === 'add') ranks[name] = { target: parseInt(document.getElementById('newRankTarget').value), ints: parseInt(document.getElementById('newRankInterviews').value) };
        else delete ranks[name];
        localStorage.setItem('gangRanks', JSON.stringify(ranks));
        sendToDiscord("إدارة・الرتب「🏛️」", `تم ${action === 'add' ? 'إضافة' : 'حذف'} الرتبة: ${name}`, 'manageRanks');
        updateRankSelect();
    }

    function editMemberName(id) {
        const newName = prompt("الاسم الجديد:", members[id].name);
        if (newName) { const oldName = members[id].name; members[id].name = newName; localStorage.setItem('gangData', JSON.stringify(members)); sendToDiscord("تغيير・اسم「📝」", `تم تغيير الاسم من ${oldName} إلى ${newName}`, 'nameChange'); showAll(); }
    }

    function renderTable(dataList) {
        let html = "<table><tr><th>ID</th><th>الاسم</th><th>الرتبة</th><th>النقاط</th><th>المقابلات</th><th>الحالة</th><th>إجراء</th></tr>";
        for (let id in dataList) {
            let m = dataList[id];
            let status = (m.points >= m.target && m.interviews >= m.targetInts) ? "✅" : "❌";
            html += `<tr><td>${id}</td><td>${m.name} <button onclick="editMemberName('${id}')">📝</button></td><td>${m.rank} <button onclick="openRankModal('${id}')">👑</button></td><td>${m.points}</td><td>${m.interviews}</td><td>${status}</td><td><button class="btn-del" onclick="deleteMember('${id}')">فصل</button></td></tr>`;
        }
        document.getElementById('displayArea').innerHTML = html + "</table>";
    }

    function showAll() { renderTable(members); }
    function updateRankSelect() { const selects = [document.getElementById('mRankSelect'), document.getElementById('filterRankSelect')]; selects.forEach(s => { s.innerHTML = ""; for (let r in ranks) s.innerHTML += `<option value="${r}">${r}</option>`; }); }
    function searchMember() { const s = document.getElementById('searchId').value; if(members[s]) renderTable({[s]: members[s]}); else alert("غير موجود"); }
    function filterByRank() { const r = document.getElementById('filterRankSelect').value; const f = {}; for(let id in members) if(members[id].rank === r) f[id] = members[id]; renderTable(f); }

    updateRankSelect();
</script>
</body>
</html>
