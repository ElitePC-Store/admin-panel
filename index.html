<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title id="pageTitle">لوحة تحكم العصابة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b0e14; color: #e0e0e0; text-align: center; padding: 20px; }
        .box { background: #161b22; padding: 20px; border-radius: 15px; width: 95%; margin: auto; border: 1px solid #30363d; }
        input, select { padding: 10px; margin: 5px; width: 140px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 8px 15px; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
        .btn-add { background: #238636; }
        .btn-del { background: #da3633; }
        .btn-search { background: #0969da; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td, th { border: 1px solid #30363d; padding: 10px; font-size: 14px; }
        #logoImg { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        #loginScreen, #rankModal, #notesModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #30363d; width: 300px; }
        textarea { width: 90%; height: 100px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loginScreen" style="display: flex;">
    <h1>دخول لوحة التحكم</h1>
    <input type="password" id="passInput" placeholder="أدخل كلمة السر">
    <button class="btn-add" onclick="checkPassword()">دخول</button>
</div>

<div id="rankModal"><div class="modal-content"><h3>تغيير الرتبة</h3><select id="selectNewRank"></select><br><br><button class="btn-add" onclick="confirmRankChange()">تحديث</button><button class="btn-del" onclick="closeModals()">إلغاء</button></div></div>
<div id="notesModal"><div class="modal-content"><h3>ملاحظات العضو</h3><textarea id="memberNotes" placeholder="اكتب الملاحظة هنا..."></textarea><br><button class="btn-add" onclick="saveNotes()">حفظ</button><button class="btn-del" onclick="closeModals()">إلغاء</button></div></div>

<div id="mainContent" class="box" style="display: none;">
    <img id="logoImg" src="https://via.placeholder.com/100" alt="Logo">
    <h1 id="mainTitle">لوحة تحكم العصابة</h1>
    
    <div><h3>تخصيص اللوحة</h3><input type="text" id="newTitle" placeholder="اسم العصابة"><input type="text" id="newLogo" placeholder="رابط الصورة"><button class="btn-add" onclick="updateSettings()">حفظ</button></div>
    <hr>
    <div><h3>بحث وفلترة</h3><input type="text" id="searchId" placeholder="ID للبحث"><button class="btn-search" onclick="searchMember()">بحث</button><select id="filterRankSelect"></select><button class="btn-search" onclick="filterByRank()">فلترة</button><button onclick="showAll()">الكل</button></div>
    <hr>
    <div><h3>إدارة الرتب</h3><input type="text" id="newRankName" placeholder="الاسم"><input type="number" id="newRankTarget" placeholder="النقاط"><button class="btn-add" onclick="manageRank('add')">إضافة</button><button class="btn-del" onclick="manageRank('del')">حذف</button></div>
    <hr>
    <div><h3>إضافة عضو</h3><input type="text" id="mId" placeholder="ID"><input type="text" id="mName" placeholder="الاسم"><select id="mRankSelect"></select><button class="btn-add" onclick="saveMember()">حفظ العضو</button></div>
    <hr>
    <h3>إدارة النقاط</h3><input type="text" id="targetId" placeholder="ID"><input type="number" id="pointInput" placeholder="النقاط"><button class="btn-add" onclick="changePoints()">تحديث</button>
    <div id="displayArea"></div>
</div>

<script>
    let members = JSON.parse(localStorage.getItem('gangData')) || {};
    let ranks = JSON.parse(localStorage.getItem('gangRanks')) || { "Helper": 100000 };
    let settings = JSON.parse(localStorage.getItem('gangSettings')) || { title: "لوحة تحكم العصابة", logo: "https://via.placeholder.com/100" };
    let currentEditingId = null;

    function checkPassword() {
        if (document.getElementById('passInput').value === "ابو العبد") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            applySettings(); showAll(); updateRankSelect();
        } else { alert("كلمة السر خاطئة!"); }
    }

    function applySettings() {
        document.getElementById('mainTitle').innerText = settings.title;
        document.getElementById('pageTitle').innerText = settings.title;
        document.getElementById('logoImg').src = settings.logo;
    }

    function openNotesModal(id) { currentEditingId = id; document.getElementById("memberNotes").value = members[id].notes || ""; document.getElementById("notesModal").style.display = "flex"; }
    function openRankModal(id) { currentEditingId = id; const select = document.getElementById("selectNewRank"); select.innerHTML = ""; for(let r in ranks) select.innerHTML += `<option value="${r}">${r}</option>`; document.getElementById("rankModal").style.display = "flex"; }
    function saveNotes() { members[currentEditingId].notes = document.getElementById("memberNotes").value; localStorage.setItem('gangData', JSON.stringify(members)); showAll(); closeModals(); }
    function closeModals() { document.getElementById("rankModal").style.display = "none"; document.getElementById("notesModal").style.display = "none"; }
    function confirmRankChange() { members[currentEditingId].rank = document.getElementById("selectNewRank").value; localStorage.setItem('gangData', JSON.stringify(members)); showAll(); closeModals(); }

    function renderTable(dataList) {
        let html = "<table><tr><th>ID</th><th>الاسم</th><th>الرتبة</th><th>النقاط</th><th>الملاحظات</th><th>إجراء</th></tr>";
        for (let id in dataList) {
            let m = dataList[id];
            html += `<tr><td>${id}</td><td>${m.name}</td><td>${m.rank}</td><td>${m.points}</td>
                <td><button onclick="openNotesModal('${id}')" style="background:#8b5cf6; color:white; border:none; padding:5px; border-radius:3px;">${m.notes ? 'عرض/تعديل' : 'إضافة'}</button></td>
                <td><button class="btn-del" onclick="deleteMember('${id}')">فصل</button></td></tr>`;
        }
        document.getElementById('displayArea').innerHTML = html + "</table>";
    }

    function saveMember() {
        const id = document.getElementById('mId').value;
        const rankEl = document.getElementById('mRankSelect');
        members[id] = { name: document.getElementById('mName').value, rank: rankEl.value, points: 0, notes: "" };
        localStorage.setItem('gangData', JSON.stringify(members));
        showAll();
    }

    function showAll() { renderTable(members); }
    function updateRankSelect() {
        const selects = [document.getElementById('mRankSelect'), document.getElementById('filterRankSelect')];
        selects.forEach(s => { s.innerHTML = ""; for(let r in ranks) s.innerHTML += `<option value="${r}">${r}</option>`; });
    }
    function updateSettings() { settings.title = document.getElementById('newTitle').value; settings.logo = document.getElementById('newLogo').value; localStorage.setItem('gangSettings', JSON.stringify(settings)); applySettings(); }
    function searchMember() { const s = document.getElementById('searchId').value; if(members[s]) renderTable({[s]: members[s]}); else alert("غير موجود"); }
    function filterByRank() { const r = document.getElementById('filterRankSelect').value; let f = {}; for(let id in members) if(members[id].rank === r) f[id] = members[id]; renderTable(f); }
    function manageRank(action) { const n = document.getElementById('newRankName').value; if(action === 'add') ranks[n] = 0; else delete ranks[n]; localStorage.setItem('gangRanks', JSON.stringify(ranks)); updateRankSelect(); }
    function changePoints() { const id = document.getElementById('targetId').value; const p = parseInt(document.getElementById('pointInput').value); if(members[id]) { members[id].points += p; localStorage.setItem('gangData', JSON.stringify(members)); showAll(); } }
    function deleteMember(id) { delete members[id]; localStorage.setItem('gangData', JSON.stringify(members)); showAll(); }

    updateRankSelect(); applySettings();
</script>
</body>
</html>
