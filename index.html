<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title id="pageTitle">لوحة تحكم العصابة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b0e14; color: #e0e0e0; text-align: center; padding: 20px; }
        .box { background: #161b22; padding: 20px; border-radius: 15px; width: 95%; margin: auto; border: 1px solid #30363d; }
        input, select { padding: 10px; margin: 5px; width: 140px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 8px 15px; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
        .btn-add { background: #238636; }
        .btn-del { background: #da3633; }
        .btn-search { background: #0969da; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td, th { border: 1px solid #30363d; padding: 10px; font-size: 14px; }
        .notes-input { width: 90% !important; min-width: 150px; background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 4px; }
        #logoImg { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        #loginScreen, #rankModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #30363d; }
    </style>
</head>
<body>

<div id="loginScreen" style="display: flex;">
    <h1>دخول لوحة التحكم</h1>
    <input type="password" id="passInput" placeholder="أدخل كلمة السر">
    <button class="btn-add" onclick="checkPassword()">دخول</button>
</div>

<div id="rankModal">
    <div class="modal-content">
        <h3>اختر الرتبة الجديدة</h3>
        <select id="selectNewRank"></select><br><br>
        <button class="btn-add" onclick="confirmRankChange()">تحديث الرتبة</button>
        <button class="btn-del" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<div id="mainContent" class="box" style="display: none;">
    <img id="logoImg" src="https://via.placeholder.com/100" alt="Logo">
    <h1 id="mainTitle">لوحة تحكم العصابة</h1>
    
    <div>
        <h3>تخصيص اللوحة</h3>
        <input type="text" id="newTitle" placeholder="اسم العصابة الجديد">
        <input type="text" id="newLogo" placeholder="رابط الصورة">
        <button class="btn-add" onclick="updateSettings()">حفظ الإعدادات</button>
    </div>
    
    <hr style="border-color: #30363d;">

    <div>
        <h3>بحث وتصفية الأعضاء</h3>
        <input type="text" id="searchId" placeholder="أدخل ID للبحث">
        <button class="btn-search" onclick="searchMember()">بحث بالـ ID</button>
        <select id="filterRankSelect"></select>
        <button class="btn-search" onclick="filterByRank()">فلترة بالرتبة</button>
        <button onclick="showAll()">إظهار الكل</button>
    </div>

    <hr style="border-color: #30363d;">

    <div>
        <h3>إدارة الرتب</h3>
        <input type="text" id="newRankName" placeholder="اسم الرتبة">
        <input type="number" id="newRankTarget" placeholder="النقاط المطلوبة">
        <input type="number" id="newRankInterviews" placeholder="المقابلات المطلوبة">
        <button class="btn-add" onclick="manageRank('add')">إضافة رتبة</button>
        <button class="btn-del" onclick="manageRank('del')">حذف رتبة</button>
        <button class="btn-del" onclick="deleteAllRanks()">حذف جميع الرتب</button>
    </div>

    <hr style="border-color: #30363d;">

    <div>
        <h3>إضافة عضو</h3>
        <input type="text" id="mId" placeholder="ID العضو">
        <input type="text" id="mName" placeholder="اسم العضو">
        <select id="mRankSelect"></select>
        <button class="btn-add" onclick="saveMember()">حفظ العضو</button>
    </div>

    <hr style="border-color: #30363d;">

    <h3>إدارة النقاط والمقابلات</h3>
    <input type="text" id="targetId" placeholder="ID العضو">
    <input type="number" id="pointInput" placeholder="النقاط">
    <button class="btn-add" onclick="changePoints()">تحديث النقاط</button>
    <button class="btn-add" onclick="changeInterviews()">زيادة المقابلات</button>
    
    <div id="displayArea"></div>
</div>

<script>
    const WEBHOOKS = {
        add: "https://discord.com/api/webhooks/1517222406140334150/coHz5FEIdj1HLWMNqZBAbu2yh-LC8aSsWOY5ye0EMLfASfvVP329dY1Ai6IWt6ZalwcW",
        points: "https://discord.com/api/webhooks/1517472882962206722/BDkDPb4x4s-pedBzO0cE8DleLXIbihMC81H5NeF_Wx-B8rkZueYXyGwDroHaLeOvXT_N",
        delete: "https://discord.com/api/webhooks/1517479737864360056/kY54uDPn9Zo5pq4vqhgk-Tn1HdNr_Zq0TrHlOMbujbXi8Jdl-YNH63TXhW4fka9F2Go_",
        rankChange: "https://discord.com/api/webhooks/1517474902066597930/EQUp8iVfIxCqwCDdbDwEJoWVNFdBhOlJFoRKfJx5bEyHkwitxi1OQ0XX_gO5t3RMAj9v",
        settings: "https://discord.com/api/webhooks/1517480388425941113/ViXeSo36kj-5HB161hPDohkj5C1DOCOhE2fOHDFoPvLGtuov0AyymOdPjKHZ-Em4aXsS",
        manageRanks: "https://discord.com/api/webhooks/1517475074729316444/uD4b0ubdYNkyhfhK9Hqz23kWBMfl8GeRJZH1TdDyPBIe4RiA-WqmaOPkkj3iW5-NaaYh",
        nameChange: "https://discord.com/api/webhooks/1517480599189852283/VM2DHJLi98hbHHY0TJiWHmfvdfcc6pbx3m6y_fK84XPaQviXVc7Udwi5jmLycBjZ8P5i"
    };

    let members = JSON.parse(localStorage.getItem('gangData')) || {};
    let ranks = JSON.parse(localStorage.getItem('gangRanks')) || { "Helper": {target: 1000, ints: 5} };
    let settings = JSON.parse(localStorage.getItem('gangSettings')) || { title: "لوحة تحكم العصابة", logo: "https://via.placeholder.com/100" };
    let currentEditingId = null;

    function sendToDiscord(action, type) {
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        fetch(WEBHOOKS[type], { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: `🚨 **تنبيه لوحة التحكم** 🚨\n📝 ${action}\n⏰ ${time}` }) }).catch(err => console.log(err));
    }

    function checkPassword() {
        if (document.getElementById('passInput').value === "ابو العبد") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            applySettings(); showAll();
        } else { alert("كلمة السر خاطئة!"); }
    }

    function applySettings() {
        document.getElementById('mainTitle').innerText = settings.title;
        document.getElementById('pageTitle').innerText = settings.title;
        document.getElementById('logoImg').src = settings.logo;
    }

    function openRankModal(id) {
        currentEditingId = id;
        const select = document.getElementById("selectNewRank");
        select.innerHTML = "";
        for (let r in ranks) { select.innerHTML += `<option value="${r}">${r}</option>`; }
        document.getElementById("rankModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("rankModal").style.display = "none"; }

    function confirmRankChange() {
        const newRank = document.getElementById("selectNewRank").value;
        members[currentEditingId].rank = newRank;
        members[currentEditingId].target = ranks[newRank].target;
        members[currentEditingId].targetInts = ranks[newRank].ints;
        localStorage.setItem('gangData', JSON.stringify(members));
        sendToDiscord(`تحديث رتبة ID: ${currentEditingId} إلى ${newRank}`, 'rankChange');
        showAll(); closeModal();
    }

    function updateSettings() {
        settings.title = document.getElementById('newTitle').value;
        settings.logo = document.getElementById('newLogo').value;
        localStorage.setItem('gangSettings', JSON.stringify(settings));
        applySettings();
    }

    function saveMember() {
        const id = document.getElementById('mId').value;
        const rankName = document.getElementById('mRankSelect').value;
        if (!id) return alert("الرجاء كتابة الـ ID");
        members[id] = { name: document.getElementById('mName').value, rank: rankName, target: ranks[rankName].target, targetInts: ranks[rankName].ints, points: 0, interviews: 0, joinDate: new Date().toLocaleDateString('en-CA'), notes: "" };
        localStorage.setItem('gangData', JSON.stringify(members));
        sendToDiscord(`إضافة عضو جديد: ${id}`, 'add');
        showAll();
    }

    function updateNote(id, val) { members[id].notes = val; localStorage.setItem('gangData', JSON.stringify(members)); }

    function renderTable(dataList) {
        let html = "<table><tr><th>ID</th><th>الاسم</th><th>الرتبة</th><th>النقاط</th><th>المقابلات</th><th>المطلوب (نقاط/مقابلات)</th><th>مستوفي</th><th>ملاحظات</th><th>إجراء</th></tr>";
        for (let id in dataList) {
            let m = dataList[id];
            let status = (m.points >= m.target && m.interviews >= m.targetInts) ? "✅" : "❌";
            html += `<tr><td>${id}</td>
                <td>${m.name} <button onclick="editMemberName('${id}')" style="background:#0969da; border:none; color:white; cursor:pointer; padding:2px 5px; border-radius:3px; font-size:10px;">تعديل</button></td>
                <td>${m.rank} <button onclick="openRankModal('${id}')" style="background:#0969da; border:none; color:white; cursor:pointer; padding:2px 5px; border-radius:3px; font-size:10px;">تغيير</button></td>
                <td>${m.points}</td><td>${m.interviews}</td><td>${m.target} / ${m.targetInts}</td><td>${status}</td>
                <td><input type="text" class="notes-input" value="${m.notes || ''}" onchange="updateNote('${id}', this.value)"></td>
                <td><button class="btn-del" onclick="deleteMember('${id}')">فصل</button></td></tr>`;
        }
        document.getElementById('displayArea').innerHTML = html + "</table>";
    }

    function showAll() { renderTable(members); }

    function updateRankSelect() {
        const selects = [document.getElementById('mRankSelect'), document.getElementById('filterRankSelect')];
        selects.forEach(s => { s.innerHTML = ""; for (let r in ranks) s.innerHTML += `<option value="${r}">${r}</option>`; });
    }

    function filterByRank() {
        const rank = document.getElementById('filterRankSelect').value;
        const filtered = {};
        for (let id in members) if (members[id].rank === rank) filtered[id] = members[id];
        renderTable(filtered);
    }

    function editMemberName(id) {
        const newName = prompt("أدخل الاسم الجديد:", members[id].name);
        if (newName) { members[id].name = newName; localStorage.setItem('gangData', JSON.stringify(members)); sendToDiscord(`تعديل اسم العضو ${id}`, 'nameChange'); showAll(); }
    }

    function searchMember() {
        const s = document.getElementById('searchId').value;
        if (members[s]) renderTable({ [s]: members[s] }); else alert("غير موجود");
    }

    function manageRank(action) {
        const name = document.getElementById('newRankName').value;
        if (!name) return;
        if (action === 'add') {
            ranks[name] = { target: parseInt(document.getElementById('newRankTarget').value), ints: parseInt(document.getElementById('newRankInterviews').value) };
        } else delete ranks[name];
        localStorage.setItem('gangRanks', JSON.stringify(ranks));
        updateRankSelect();
        sendToDiscord(`إدارة الرتب: ${action} ${name}`, 'manageRanks');
    }

    function changePoints() {
        const id = document.getElementById('targetId').value;
        const pts = parseInt(document.getElementById('pointInput').value);
        if(members[id]) { members[id].points += pts; localStorage.setItem('gangData', JSON.stringify(members)); sendToDiscord(`تحديث نقاط ${id}`, 'points'); showAll(); }
    }

    function changeInterviews() {
        const id = document.getElementById('targetId').value;
        if(members[id]) { members[id].interviews += 1; localStorage.setItem('gangData', JSON.stringify(members)); sendToDiscord(`زيادة مقابلة لـ ${id}`, 'points'); showAll(); }
    }

    function deleteMember(id) { if(confirm("فصل العضو؟")) { delete members[id]; localStorage.setItem('gangData', JSON.stringify(members)); sendToDiscord(`فصل ${id}`, 'delete'); showAll(); } }
    function deleteAllRanks() { if (confirm("حذف كل الرتب؟")) { ranks = {}; localStorage.setItem('gangRanks', JSON.stringify(ranks)); updateRankSelect(); sendToDiscord("حذف كل الرتب", 'manageRanks'); } }
    
    updateRankSelect();
</script>
</body>
</html>
