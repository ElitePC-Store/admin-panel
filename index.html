<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gang Control Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b0e14; color: #e0e0e0; text-align: center; padding: 20px; }
        .box { background: #161b22; padding: 20px; border-radius: 15px; width: 90%; margin: auto; border: 1px solid #30363d; }
        input, select { padding: 10px; margin: 5px; width: 180px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 8px 15px; background: #238636; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
        .btn-red { background: #da3633; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td, th { border: 1px solid #30363d; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Gang Control Panel</h1>
    <div>
        <input type="text" id="mId" placeholder="ID العضو">
        <input type="text" id="mName" placeholder="اسم العضو">
        <select id="mRank">
            <option value="Helper" data-target="100000">Helper</option>
            <option value="Visor" data-target="100">Visor</option>
        </select>
        <button onclick="saveMember()">إضافة عضو</button>
    </div>

    <hr style="border-color: #30363d;">

    <h3>إدارة النقاط</h3>
    <input type="number" id="pointInput" placeholder="النقاط (مثال: 50)">
    <button onclick="changePoints()">تحديث النقاط</button>
    
    <div id="displayArea"></div>
</div>

<script>
    let members = JSON.parse(localStorage.getItem('gangData')) || {};

    function saveMember() {
        const id = document.getElementById('mId').value;
        const rankEl = document.getElementById('mRank');
        const now = new Date().toISOString().split('T')[0];
        members[id] = {
            name: document.getElementById('mName').value,
            rank: rankEl.value,
            target: parseInt(rankEl.options[rankEl.selectedIndex].dataset.target),
            points: 0,
            joinDate: now
        };
        localStorage.setItem('gangData', JSON.stringify(members));
        showAll();
    }

    function changePoints() {
        const id = document.getElementById('mId').value;
        const pts = parseInt(document.getElementById('pointInput').value);
        if(members[id]) {
            members[id].points += pts;
            localStorage.setItem('gangData', JSON.stringify(members));
            showAll();
        }
    }

    function deleteMember(id) {
        delete members[id];
        localStorage.setItem('gangData', JSON.stringify(members));
        showAll();
    }

    function showAll() {
        let html = "<table><tr><th>ID</th><th>الاسم</th><th>الرتبة</th><th>تاريخ التوظيف</th><th>النقاط</th><th>المطلوب</th><th>مستوفي الشروط</th><th>إجراء</th></tr>";
        for (let id in members) {
            let m = members[id];
            let status = m.points >= m.target ? "✅" : "❌";
            html += `<tr><td>${id}</td><td>${m.name}</td><td>${m.rank}</td><td>${m.joinDate}</td><td>${m.points}</td><td>${m.target}</td><td>${status}</td>
                     <td><button class="btn-red" onclick="deleteMember('${id}')">فصل</button></td></tr>`;
        }
        document.getElementById('displayArea').innerHTML = html + "</table>";
    }
    
    showAll();
</script>
</body>
</html>
