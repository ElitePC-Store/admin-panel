<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم يوسف</title>
    <style>
        body { font-family: Arial; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 400px; margin: auto; }
        input { padding: 10px; margin: 5px; width: 80%; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; margin: 5px; }
        .delete-btn { background: #dc3545; }
    </style>
</head>
<body>

<div class="box">
    <h1>لوحة تحكم يوسف</h1>
    <input type="text" id="mId" placeholder="أدخل الـ ID">
    <button onclick="searchMember()">بحث</button>
    <div id="result"></div>
    <hr>
    <h3>إدارة الأعضاء</h3>
    <input type="text" id="addId" placeholder="ID العضو">
    <input type="text" id="addRank" placeholder="الرتبة">
    <input type="text" id="addDate" placeholder="تاريخ الدخول (يوم-شهر-سنة)">
    <button onclick="addMember()">إضافة/تعديل عضو</button>
    <button class="delete-btn" onclick="deleteMember()">فصل عضو</button>
</div>

<script>
    let members = JSON.parse(localStorage.getItem('gangMembers')) || {};

    function searchMember() {
        const id = document.getElementById('mId').value;
        const res = document.getElementById('result');
        if (members[id]) {
            res.innerHTML = `الرتبة: ${members[id].rank}<br>تاريخ الدخول: ${members[id].date}`;
        } else {
            res.innerHTML = "هذا العضو غير موجود.";
        }
    }

    function addMember() {
        const id = document.getElementById('addId').value;
        const rank = document.getElementById('addRank').value;
        const date = document.getElementById('addDate').value;
        if(id && rank && date) {
            members[id] = { rank, date };
            localStorage.setItem('gangMembers', JSON.stringify(members));
            alert("تم حفظ العضو!");
        }
    }

    function deleteMember() {
        const id = document.getElementById('addId').value;
        if(members[id]) {
            delete members[id];
            localStorage.setItem('gangMembers', JSON.stringify(members));
            alert("تم فصل العضو.");
        }
    }
</script>
</body>
</html>
