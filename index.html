<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الإدارية</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b0e14; color: #e0e0e0; text-align: center; padding: 20px; }
        .box { background: #161b22; padding: 20px; border-radius: 15px; width: 95%; margin: auto; border: 1px solid #30363d; }
        input, select { padding: 10px; margin: 5px; width: 140px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 8px 15px; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
        .btn-add { background: #238636; }
        .btn-sub { background: #b62323; }
        .btn-del { background: #da3633; }
        .btn-search { background: #0969da; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td, th { border: 1px solid #30363d; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="loginScreen" style="display: flex; flex-direction: column; align-items: center;">
    <h1>تسجيل دخول الإدارة</h1>
    <input type="text" id="adminIdInput" placeholder="أدخل ID المسؤول">
    <button class="btn-add" onclick="checkAdmin()">دخول</button>
</div>

<div id="mainContent" class="box" style="display: none;">
    <h1>لوحة تحكم المسؤولين</h1>
    
    <!-- قسم إدارة المسؤولين -->
    <div>
        <h3>إدارة المسؤولين (Admin Panel)</h3>
        <input type="text" id="newAdminId" placeholder="ID المسؤول الجديد">
        <button class="btn-add" onclick="addAdmin()">إضافة مسؤول</button>
    </div>
    <hr>
    
    <!-- باقي الميزات كما هي -->
    <h3>إدارة النقاط</h3>
    <input type="text" id="targetId" placeholder="ID العضو">
    <input type="number" id="pointInput" placeholder="القيمة">
    <br>
    <button class="btn-add" onclick="changePoints(true)">+ نقاط</button>
    <button class="btn-sub" onclick="changePoints(false)">- نقاط</button>
    <button class="btn-add" onclick="changeInterviews(true)">+ مقابلة</button>
    <button class="btn-sub" onclick="changeInterviews(false)">- مقابلة</button>
    
    <div id="displayArea"></div>
</div>

<script>
    // قائمة المسؤولين المخزنة
    let admins = JSON.parse(localStorage.getItem('gangAdmins')) || ["123456"]; // أضف ID الخاص بك هنا
    let members = JSON.parse(localStorage.getItem('gangData')) || {};

    function checkAdmin() {
        const id = document.getElementById('adminIdInput').value;
        if (admins.includes(id)) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            showAll();
        } else {
            alert("أنت لست مسؤولاً!");
        }
    }

    function addAdmin() {
        const id = document.getElementById('newAdminId').value;
        if(id && !admins.includes(id)) {
            admins.push(id);
            localStorage.setItem('gangAdmins', JSON.stringify(admins));
            alert("تم إضافة المسؤول بنجاح!");
        }
    }

    // باقي الدوال (changePoints, changeInterviews, showAll...) 
    // يمكنك دمجها هنا بنفس الطريقة السابقة لضمان عمل اللوحات
    function changePoints(isAdd) { /* ... نفس كودك السابق ... */ }
    function changeInterviews(isAdd) { /* ... نفس كودك السابق ... */ }
    function showAll() { /* ... نفس كودك السابق ... */ }
</script>
</body>
</html>
